<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes App</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased p-6 md:p-12">
    <div class="max-w-3xl mx-auto">
        <header class="mb-10 border-b pb-4">
            <h1 class="text-4xl font-extrabold text-slate-900 tracking-tight">Notes</h1>
            <p class="text-slate-500 mt-2">Simpan catatan hari ini</p>
        </header>

        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 mb-10">
            <input type="hidden" id="noteId">
            <div class="mb-4">
                <input type="text" id="judul" placeholder="Judul Catatan" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-colors">
            </div>
            <div class="mb-4">
                <textarea id="isi" placeholder="Tulis isinya di sini..." rows="4" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-colors"></textarea>
            </div>
            <button onclick="saveNote()" class="bg-blue-600 text-white font-semibold px-6 py-2.5 rounded-lg hover:bg-blue-700 transition-colors">
                Simpan Catatan
            </button>
        </div>

        <div id="notesList" class="grid gap-4 md:grid-cols-2">
            </div>
    </div>

    <script>
        const API_URL = 'https://backend-053-729492539702.us-central1.run.app'; 

        document.addEventListener('DOMContentLoaded', fetchNotes);

        async function fetchNotes() {
            try {
                const response = await fetch(API_URL);
                const result = await response.json();
                const notes = result.data || result; 
                renderNotes(notes);
            } catch (error) {
                console.error("Gagal mengambil data:", error);
            }
        }

        function renderNotes(notes) {
            const container = document.getElementById('notesList');
            container.innerHTML = '';
            
            if(!notes || notes.length === 0) {
                container.innerHTML = '<p class="text-slate-400 col-span-2 text-center py-8">Belum ada catatan.</p>';
                return;
            }

            notes.forEach(note => {
                container.innerHTML += `
                    <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-200 flex flex-col justify-between hover:shadow-md transition-shadow">
                        <div>
                            <h3 class="font-bold text-lg text-slate-900 mb-2">${note.judul}</h3>
                            <p class="text-slate-600 text-sm whitespace-pre-wrap">${note.isi}</p>
                        </div>
                        <div class="mt-5 flex gap-4 border-t pt-3">
                            <button onclick="editNote(${note.id}, '${note.judul}', '${note.isi}')" class="text-sm font-medium text-blue-600 hover:text-blue-800 transition-colors">Edit</button>
                            <button onclick="deleteNote(${note.id})" class="text-sm font-medium text-red-600 hover:text-red-800 transition-colors">Hapus</button>
                        </div>
                    </div>
                `;
            });
        }

        async function saveNote() {
            const id = document.getElementById('noteId').value;
            const judul = document.getElementById('judul').value;
            const isi = document.getElementById('isi').value;

            if(!judul || !isi) return alert("Judul dan isi harus diisi!");

            const method = id ? 'PUT' : 'POST';
            const url = id ? `${API_URL}/${id}` : API_URL;

            try {
                await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ judul, isi })
                });
                
                // Reset form setelah simpan
                document.getElementById('noteId').value = '';
                document.getElementById('judul').value = '';
                document.getElementById('isi').value = '';
                
                fetchNotes(); // Reload data
            } catch (error) {
                console.error("Gagal menyimpan data:", error);
            }
        }

        function editNote(id, judul, isi) {
            document.getElementById('noteId').value = id;
            document.getElementById('judul').value = judul;
            document.getElementById('isi').value = isi;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function deleteNote(id) {
            if(!confirm("Yakin mau hapus catatan ini?")) return;
            try {
                await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                fetchNotes();
            } catch (error) {
                console.error("Gagal menghapus data:", error);
            }
        }
    </script>
</body>
</html>
